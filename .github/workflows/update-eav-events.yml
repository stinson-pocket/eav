name: Refresh EAV Events

on:
  schedule:
    - cron: "0 23 * * 3" # weekly on Wednesday at 23:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync events from source feeds
        run: python3 scripts/sync_eav_events.py --site-root site

      - name: Commit updated events.json (if changed)
        run: |
          if git diff --quiet -- site/data/events.json; then
            echo "No changes in events.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/events.json
          git commit -m "chore(events): weekly refresh from EABA + EACA"
          git push

      - name: Notify failure channels
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ALERT_TITLE: EAV Events Automation Failed
          ALERT_MESSAGE: "update-eav-events.yml failed. Check GitHub Actions logs for details."
        run: node scripts/send_alert.js
