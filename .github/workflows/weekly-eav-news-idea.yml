name: Weekly EAV News Idea

on:
  schedule:
    - cron: "15 23 * * 3" # weekly on Wednesday at 23:15 UTC
  workflow_dispatch: {}

jobs:
  generate-and-email:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Refresh events first (tomorrow onward)
        run: python3 scripts/sync_eav_events.py --site-root site

      - name: Generate one weekly story draft
        run: python3 scripts/generate_weekly_news_idea.py

      - name: Email draft to admin
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: node scripts/send_news_idea_email.js

      - name: Notify failure channels
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ALERT_TITLE: EAV Weekly News Draft Automation Failed
          ALERT_MESSAGE: "weekly-eav-news-idea.yml failed. Check GitHub Actions logs for details."
        run: node scripts/send_alert.js
